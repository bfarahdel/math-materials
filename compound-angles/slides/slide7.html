<div class="slide-container" id="slide7">
    <h2 class="slide-title">Compound Angle Formulae</h2>
    <div class="content-area">
        <div class="formula-summary-grid">
            <div class="formula-card">
                <h4>Sine Addition/Subtraction</h4>
                <div class="math-container" style="font-size: 1.8vw; padding: 1vw;">
                    <math xmlns="http://www.w3.org/1998/Math/MathML">
                        <mi>sin</mi><mo>(</mo><mi>A</mi><mo>&#177;</mo><mi>B</mi><mo>)</mo><mo>=</mo><mi>sin</mi><mi>A</mi><mi>cos</mi><mi>B</mi><mo>&#177;</mo><mi>cos</mi><mi>A</mi><mi>sin</mi><mi>B</mi>
                    </math>
                </div>
            </div>
            <div class="formula-card">
                <h4>Cosine Addition/Subtraction</h4>
                <div class="math-container" style="font-size: 1.8vw; padding: 1vw;">
                    <math xmlns="http://www.w3.org/1998/Math/MathML">
                        <mi>cos</mi><mo>(</mo><mi>A</mi><mo>&#177;</mo><mi>B</mi><mo>)</mo><mo>=</mo><mi>cos</mi><mi>A</mi><mi>cos</mi><mi>B</mi><mo>&#8723;</mo><mi>sin</mi><mi>A</mi><mi>sin</mi><mi>B</mi>
                    </math>
                </div>
            </div>
            <div class="formula-card" style="grid-column: span 2;">
                <h4>Tangent Addition/Subtraction</h4>
                <div class="math-container" style="font-size: 1.8vw; padding: 1vw;">
                    <math xmlns="http://www.w3.org/1998/Math/MathML">
                        <mi>tan</mi><mo>(</mo><mi>A</mi><mo>&#177;</mo><mi>B</mi><mo>)</mo><mo>=</mo>
                        <mfrac>
                            <mrow><mi>tan</mi><mi>A</mi><mo>&#177;</mo><mi>tan</mi><mi>B</mi></mrow>
                            <mrow><mn>1</mn><mo>&#8723;</mo><mi>tan</mi><mi>A</mi><mi>tan</mi><mi>B</mi></mrow>
                        </mfrac>
                    </math>
                </div>
            </div>
        </div>
        <p style="margin-top: 1.5vw; text-align: center; color: #64748b; font-style: italic;">Note the sign reversal in the Cosine formula!</p>
    </div>
</div>
