<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solve Quadratic Inequality Algebraically</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code&display=swap');

        body {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .math-card {
            width: 100%;
            max-width: 1100px;
            background: #1e293b;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #loader {
            position: absolute;
            inset: 0;
            background: #0f172a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(16, 185, 129, 0.2);
            border-left-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .equation-box {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid #10b981;
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }

        .input-correct {
            border-color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.1) !important;
            color: #10b981 !important;
        }

        .input-error {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lang-btn.active {
            background-color: #10b981;
            color: white;
        }

        .number-line-container {
            background: #f8fafc;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .number-line-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .step-bubble {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            margin-right: 12px;
        }

        .test-marker {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { transform: scale(0) translateY(10px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="math-card">
    <div id="loader">
        <div class="spinner mb-4"></div>
        <div class="text-emerald-400 font-bold text-xs uppercase tracking-[0.2em] animate-pulse">Initializing Lesson...</div>
    </div>

    <!-- Header -->
    <div class="bg-slate-800/80 p-6 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border border-emerald-500/30">Example 5</span>
            <h1 id="mainTitle" class="text-xl font-bold text-white tracking-tight leading-none">Solving Quadratic Inequalities Algebraically</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
                <button onclick="setLanguage('en')" id="enBtn" class="lang-btn active px-3 py-1 text-[10px] font-bold rounded-md transition-all">EN</button>
                <button onclick="setLanguage('zh')" id="zhBtn" class="lang-btn px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-400 hover:text-white">中文</button>
            </div>
            <span class="bg-black/20 px-3 py-1.5 rounded-md text-xs font-bold font-mono text-white/90 border border-slate-700"><span id="pageLabel">PAGE</span> 214</span>
        </div>
    </div>

    <div class="flex flex-col md:flex-row flex-1">
        <!-- Visualization Side -->
        <div class="w-full md:w-3/5 p-8 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-700 bg-slate-900/30">
            <div class="number-line-container w-full">
                <svg id="visualizer" viewBox="0 0 500 150" class="number-line-svg">
                    <!-- Base line -->
                    <line x1="30" y1="90" x2="470" y2="90" stroke="#94a3b8" stroke-width="3" />
                    <!-- Ticks -->
                    <g id="ticks"></g>
                    <!-- Solutions/Highlights -->
                    <g id="highlights"></g>
                    <!-- Test Indicator Layer -->
                    <g id="testIndicator"></g>
                    <!-- Labels -->
                    <g id="labels"></g>
                </svg>
            </div>
            <div class="mt-8 text-center w-full">
                <div id="equationDisplay" class="font-mono text-2xl text-emerald-400 font-bold bg-slate-900/50 px-8 py-4 rounded-xl border border-slate-700 inline-block">
                    \( x^2 - 3x \le 18 \)
                </div>
            </div>
        </div>

        <!-- Instruction Side -->
        <div class="w-full md:w-2/5 p-8 flex flex-col bg-slate-800/20">
            <div id="explanationContainer" class="flex-1 animate-fade">
                <div class="flex items-center mb-4">
                    <div id="stepIcon" class="step-bubble bg-indigo-600 text-white">1</div>
                    <h2 id="stepTitle" class="text-indigo-400 font-bold text-sm uppercase tracking-widest">Step 1</h2>
                </div>
                
                <div id="stepContent" class="space-y-4">
                    <div id="stepText" class="text-slate-200 text-lg leading-relaxed"></div>
                </div>

                <!-- Interaction Area Step 1 -->
                <div id="interactionStep1" class="hidden mt-6 p-5 bg-slate-900/50 rounded-xl border border-slate-700">
                    <div class="text-sm text-slate-400 font-medium mb-3" id="factoringLabel"></div>
                    <div class="flex items-center gap-2 font-mono text-xl text-white">
                        <span>(x + </span>
                        <input type="number" id="factor1" class="w-14 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-emerald-400 text-center" placeholder="?">
                        <span>)(x - </span>
                        <input type="number" id="factor2" class="w-14 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-emerald-400 text-center" placeholder="?">
                        <span>) = 0</span>
                    </div>
                    <div class="flex flex-col gap-2 mt-4">
                        <button id="checkStep1" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg text-sm font-bold transition-all" data-t="verify">Verify Factors</button>
                        <button id="showSolutionBtn" class="hidden w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-[10px] font-bold text-slate-300 uppercase tracking-widest transition-all">Show Solution</button>
                    </div>
                    <div id="step1Feedback" class="mt-2 text-xs font-bold hidden"></div>
                </div>

                <div id="interactionStep3" class="hidden mt-6 space-y-3">
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="testPoint(-5)" class="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold transition-all">Test x = -5</button>
                        <button onclick="testPoint(0)" class="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold transition-all">Test x = 0</button>
                        <button onclick="testPoint(8)" class="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold transition-all">Test x = 8</button>
                    </div>
                    <div id="testResult" class="p-4 bg-slate-900/80 rounded-xl border border-slate-700 min-h-[100px] flex items-center justify-center text-sm text-slate-300 italic text-center leading-relaxed">
                        Select a point to test the inequality...
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="mt-8 flex items-center justify-between border-t border-slate-700 pt-6">
                <button id="prevBtn" class="flex items-center gap-1 px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all text-xs font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
                    <span data-t="prev">PREV</span>
                </button>
                <div id="stepCounter" class="text-slate-500 font-mono text-[10px] font-bold uppercase tracking-widest">Step 1 / 3</div>
                <button id="nextBtn" class="flex items-center gap-1 px-6 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 disabled:cursor-not-allowed transition-all text-xs font-bold">
                    <span id="nextBtnText" data-t="next">NEXT</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
        </div>
    </div>
    
    <div id="footerText" class="bg-slate-900 px-8 py-3 flex justify-center text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] border-t border-slate-800">
        Lesson 3-7: Quadratic Inequalities
    </div>
</div>

<script>
    const translations = {
        en: {
            title: "Solving Quadratic Inequalities Algebraically",
            page: "PAGE",
            prev: "PREV",
            next: "NEXT",
            restart: "RESTART",
            step: "Step",
            verify: "Verify Factors",
            factoringLabel: "Solve the related equation: \\( x^2 - 3x - 18 = 0 \\)",
            loading: "Loading...",
            correct: "Perfect! \\( (x+3)(x-6) = 0 \\) gives \\( x = -3 \\) and \\( x = 6 \\).",
            revealed: "Solution: \\( (x+3)(x-6) = 0 \\) gives \\( x = -3 \\) and \\( x = 6 \\).",
            wrong: "Not quite. Think of two numbers that multiply to -18 and add to -3.",
            testHint: "Select a point to test the inequality...",
            showSolution: "Show Solution",
            steps: [
                {
                    title: "Step 1: Related Equation",
                    text: "First, solve the related quadratic equation \\( x^2 - 3x = 18 \\) to find the critical boundary points. Subtract 18 from each side to set the equation to zero: <div class='equation-box'>\\( x^2 - 3x - 18 = 0 \\)</div>"
                },
                {
                    title: "Step 2: Plot the Solutions",
                    text: "Plot the boundary values \\( -3 \\) and \\( 6 \\) on a number line. Because the inequality is \\( \\le \\) (less than or <b>equal to</b>), we use <b>solid dots</b>. These points divide the line into three test intervals."
                },
                {
                    title: "Step 3: Test and Solve",
                    text: "Test a value from each interval in the original inequality \\( x^2 - 3x \\le 18 \\). If the resulting statement is true, that entire interval is part of the solution set."
                }
            ]
        },
        zh: {
            title: "代数法解二次不等式",
            page: "第",
            prev: "上一步",
            next: "下一步",
            restart: "重新开始",
            step: "步骤",
            verify: "验证因式分解",
            factoringLabel: "解相关方程: \\( x^2 - 3x - 18 = 0 \\)",
            loading: "加载中...",
            correct: "太棒了！\\( (x+3)(x-6) = 0 \\) 得出 \\( x = -3 \\) 且 \\( x = 6 \\)。",
            revealed: "解答：\\( (x+3)(x-6) = 0 \\) 得出 \\( x = -3 \\) 且 \\( x = 6 \\)。",
            wrong: "不完全正确。找两个相乘等于 -18 且相加等于 -3 的数。",
            testHint: "选择一个点来测试不等式...",
            showSolution: "查看解法",
            steps: [
                {
                    title: "步骤 1: 相关方程",
                    text: "首先，解相关的二次方程 \\( x^2 - 3x = 18 \\) 以找到临界边界点。将等式两边各减去 18，使其等于零：<div class='equation-box'>\\( x^2 - 3x - 18 = 0 \\)</div>"
                },
                {
                    title: "步骤 2: 绘制解集点",
                    text: "在数轴上绘制边界值 \\( -3 \\) 和 \\( 6 \\)。由于不等号是 \\( \\le \\)（小于或<b>等于</b>），我们使用<b>实心点</b>。这些点将数轴划分为三个测试区间。"
                },
                {
                    title: "步骤 3: 测试并求解",
                    text: "从每个区间中选择一个值代入原始不等式 \\( x^2 - 3x \\le 18 \\) 进行测试。如果结果为真，则整个区间都是解集的一部分。"
                }
            ]
        }
    };

    let currentLang = 'en';
    let currentStep = 0;
    let step1Solved = false;
    let failedAttempts = 0;
    let lastTestedPoint = null;
    const totalSteps = 3;

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('enBtn').className = `lang-btn px-3 py-1 text-[10px] font-bold rounded-md transition-all ${lang === 'en' ? 'active' : 'text-slate-400 hover:text-white'}`;
        document.getElementById('zhBtn').className = `lang-btn px-3 py-1 text-[10px] font-bold rounded-md transition-all ${lang === 'zh' ? 'active' : 'text-slate-400 hover:text-white'}`;
        const t = translations[lang];
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('pageLabel').innerText = t.page;
        document.getElementById('footerText').innerText = `Lesson 3-7: ${t.title}`;
        document.getElementById('factoringLabel').innerText = t.factoringLabel;
        document.getElementById('showSolutionBtn').innerText = t.showSolution;
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if (t[key]) el.innerText = t[key];
        });
        updateUI();
    }

    const startX = 30;
    const endX = 470;
    const width = endX - startX;
    const minVal = -8;
    const maxVal = 10;
    const range = maxVal - minVal;
    const getPos = (val) => startX + ((val - minVal) / range) * width;

    function drawNumberLine() {
        const ticks = document.getElementById('ticks');
        const highlights = document.getElementById('highlights');
        const labels = document.getElementById('labels');
        const testIndicator = document.getElementById('testIndicator');
        
        ticks.innerHTML = '';
        highlights.innerHTML = '';
        labels.innerHTML = '';
        testIndicator.innerHTML = '';

        for (let i = minVal; i <= maxVal; i++) {
            const x = getPos(i);
            ticks.innerHTML += `<line x1="${x}" y1="82" x2="${x}" y2="98" stroke="#475569" stroke-width="2" />`;
            if (i % 2 === 0 || i === -3 || i === 6) {
                labels.innerHTML += `<text x="${x}" y="125" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">${i}</text>`;
            }
        }

        if (currentStep >= 1) {
            const x1 = getPos(-3);
            const x2 = getPos(6);
            highlights.innerHTML += `<circle cx="${x1}" cy="90" r="7" fill="#10b981" />`;
            highlights.innerHTML += `<circle cx="${x2}" cy="90" r="7" fill="#10b981" />`;

            if (currentStep === 1) {
                highlights.innerHTML += `<line x1="${x1}" y1="50" x2="${x1}" y2="90" stroke="#ef4444" stroke-width="2" stroke-dasharray="6" />`;
                highlights.innerHTML += `<line x1="${x2}" y1="50" x2="${x2}" y2="90" stroke="#ef4444" stroke-width="2" stroke-dasharray="6" />`;
                
                const mid1 = getPos(-5.5);
                const mid2 = getPos(1.5);
                const mid3 = getPos(8);
                const labelStyle = 'font-size="16" fill="#ef4444" text-anchor="middle" font-weight="900"';
                labels.innerHTML += `<text x="${mid1}" y="40" ${labelStyle}>x ≤ -3</text>`;
                labels.innerHTML += `<text x="${mid2}" y="40" ${labelStyle}>-3 ≤ x ≤ 6</text>`;
                labels.innerHTML += `<text x="${mid3}" y="40" ${labelStyle}>x ≥ 6</text>`;
            }
        }

        if (currentStep === 2) {
            const x1 = getPos(-3);
            const x2 = getPos(6);
            highlights.innerHTML += `<line x1="${x1}" y1="90" x2="${x2}" y2="90" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" opacity="0.6" />`;
            highlights.innerHTML += `<circle cx="${x1}" cy="90" r="8" fill="#3b82f6" />`;
            highlights.innerHTML += `<circle cx="${x2}" cy="90" r="8" fill="#3b82f6" />`;
            
            if (lastTestedPoint !== null) {
                const px = getPos(lastTestedPoint.val);
                const color = lastTestedPoint.isTrue ? "#10b981" : "#ef4444";
                const symbol = lastTestedPoint.isTrue ? "✓" : "✕";
                
                testIndicator.innerHTML = `
                    <g class="test-marker">
                        <circle cx="${px}" cy="90" r="12" fill="white" stroke="${color}" stroke-width="2" />
                        <text x="${px}" y="95" font-size="14" fill="${color}" text-anchor="middle" font-weight="900">${symbol}</text>
                        <text x="${px}" y="70" font-size="12" fill="${color}" text-anchor="middle" font-weight="bold">x = ${lastTestedPoint.val}</text>
                    </g>
                `;
            }
        }
    }

    async function updateUI() {
        const t = translations[currentLang];
        const step = t.steps[currentStep];
        const container = document.getElementById('explanationContainer');
        
        container.classList.remove('animate-fade');
        void container.offsetWidth; 
        container.classList.add('animate-fade');

        document.getElementById('stepIcon').innerText = currentStep + 1;
        document.getElementById('stepTitle').innerText = step.title;
        document.getElementById('stepText').innerHTML = step.text;
        document.getElementById('stepCounter').innerText = `${t.step} ${currentStep + 1} / ${totalSteps}`;

        document.getElementById('interactionStep1').classList.toggle('hidden', currentStep !== 0);
        document.getElementById('interactionStep3').classList.toggle('hidden', currentStep !== 2);

        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = (currentStep === 0 && !step1Solved);

        document.getElementById('nextBtnText').innerText = currentStep === totalSteps - 1 ? t.restart : t.next;
        document.getElementById('prevBtn').disabled = currentStep === 0;

        drawNumberLine();
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function testPoint(val) {
        const resultDiv = document.getElementById('testResult');
        const square = val * val;
        const term2 = 3 * val;
        const lhs = square - term2;
        const isTrue = lhs <= 18;
        
        lastTestedPoint = { val, isTrue };
        drawNumberLine();

        let msg = "";
        if (currentLang === 'en') {
            msg = `Testing \\( x = ${val} \\):<br>\\( ${val}^2 - 3(${val}) \\le 18 \\) <br> \\( ${square} - (${term2}) \\le 18 \\) <br> <b>\\( ${lhs} \\le 18 \\)</b> is <b>${isTrue ? 'TRUE' : 'FALSE'}</b>.`;
        } else {
            msg = `测试 \\( x = ${val} \\):<br>\\( ${val}^2 - 3(${val}) \\le 18 \\) <br> \\( ${square} - (${term2}) \\le 18 \\) <br> <b>\\( ${lhs} \\le 18 \\)</b> 为 <b>${isTrue ? '正确' : '错误'}</b>。`;
        }
        
        resultDiv.innerHTML = msg;
        resultDiv.className = isTrue ? "p-4 bg-emerald-500/10 rounded-xl border border-emerald-500/30 text-base text-emerald-200 text-center leading-relaxed" : "p-4 bg-red-500/10 rounded-xl border border-red-500/30 text-base text-red-200 text-center leading-relaxed";
        
        if (window.MathJax) MathJax.typesetPromise([resultDiv]);
    }

    function markStep1Solved(isManual = true) {
        const t = translations[currentLang];
        const feedback = document.getElementById('step1Feedback');
        step1Solved = true;
        
        feedback.innerText = isManual ? t.correct : t.revealed;
        
        feedback.className = "mt-2 text-xs font-bold text-emerald-400 animate-fade";
        feedback.classList.remove('hidden');
        document.getElementById('factor1').classList.remove('input-error');
        document.getElementById('factor1').classList.add('input-correct');
        document.getElementById('factor2').classList.remove('input-error');
        document.getElementById('factor2').classList.add('input-correct');
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('showSolutionBtn').classList.add('hidden');
        if (window.MathJax) MathJax.typesetPromise([feedback]);
    }

    document.getElementById('checkStep1').onclick = () => {
        const f1 = parseInt(document.getElementById('factor1').value);
        const f2 = parseInt(document.getElementById('factor2').value);
        const feedback = document.getElementById('step1Feedback');
        const t = translations[currentLang];

        if ((f1 === 3 && f2 === 6) || (f1 === -6 && f2 === -3)) {
            markStep1Solved(true);
        } else {
            failedAttempts++;
            feedback.innerText = t.wrong;
            feedback.className = "mt-2 text-xs font-bold text-red-400";
            feedback.classList.remove('hidden');
            document.getElementById('factor1').classList.add('input-error');
            document.getElementById('factor2').classList.add('input-error');
            
            if (failedAttempts >= 3) {
                document.getElementById('showSolutionBtn').classList.remove('hidden');
            }

            setTimeout(() => {
                document.getElementById('factor1').classList.remove('input-error');
                document.getElementById('factor2').classList.remove('input-error');
            }, 500);
        }
        if (window.MathJax) MathJax.typesetPromise([feedback]);
    };

    document.getElementById('showSolutionBtn').onclick = () => {
        document.getElementById('factor1').value = 3;
        document.getElementById('factor2').value = 6;
        markStep1Solved(false);
    };

    document.getElementById('nextBtn').onclick = () => {
        if (currentStep < totalSteps - 1) {
            currentStep++;
            lastTestedPoint = null;
            updateUI();
        } else {
            currentStep = 0;
            step1Solved = false;
            failedAttempts = 0;
            lastTestedPoint = null;
            document.getElementById('factor1').value = '';
            document.getElementById('factor2').value = '';
            document.getElementById('factor1').classList.remove('input-correct');
            document.getElementById('factor2').classList.remove('input-correct');
            document.getElementById('step1Feedback').classList.add('hidden');
            document.getElementById('showSolutionBtn').classList.add('hidden');
            document.getElementById('testResult').innerHTML = translations[currentLang].testHint;
            document.getElementById('testResult').className = "p-4 bg-slate-900/80 rounded-xl border border-slate-700 min-h-[100px] flex items-center justify-center text-sm text-slate-300 italic text-center";
            updateUI();
        }
    };

    document.getElementById('prevBtn').onclick = () => {
        if (currentStep > 0) {
            currentStep--;
            lastTestedPoint = null;
            updateUI();
        }
    };

    window.onload = function() {
        setLanguage('en');
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }, 1000);
    };
</script>
</body>
</html>
