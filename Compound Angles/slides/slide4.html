<div class="slide-container" id="slide4">
    <h2 class="slide-title">Decomposition</h2>
    <div class="content-area">
        <div class="two-column-grid">
            <div>
                <p>To solve for <span style="color:#2563eb; font-weight:700;">105°</span>, we break it into special angles.</p>
                <p style="font-size: 1.4vw; color: #64748b;">Select two special angles that add up to 105°.</p>
            </div>
            <div class="wheel-column">
                <div class="wheel-wrapper" id="angleWheel">
                    <div class="angle-center">105°</div>
                    <div class="angle-item" data-deg="0">0°</div>
                    <div class="angle-item" data-deg="30">30°</div>
                    <div class="angle-item" data-deg="45">45°</div>
                    <div class="angle-item" data-deg="60">60°</div>
                    <div class="angle-item" data-deg="90">90°</div>
                    <div class="angle-item" data-deg="180">180°</div>
                </div>
                <div class="sum-display" id="sumDisplay">105° = ? + ?</div>
                <div class="feedback-msg" id="feedback"></div>
                <button class="reveal-btn" style="background:#64748b; padding:0.4vw 1vw; font-size:1vw;" onclick="resetAngles()">Reset</button>
            </div>
        </div>
    </div>
</div>
